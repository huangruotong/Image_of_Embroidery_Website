<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Embroidery Design{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body class="{{ body_class|default('min-h-screen flex flex-col') }}">
    {% block body_start %}{% endblock %}

    <nav class="primary-bg text-white shadow-md">
        <div class="w-full px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="{{ brand_href|default(url_for('index')) }}" class="flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758a3 3 0 10-4.243 4.243 3 3 0 004.243-4.243zm0-5.758a3 3 0 10-4.243-4.243 3 3 0 004.243 4.243z"></path>
                    </svg>
                    <span class="text-xl font-semibold">Embroidery Design</span>
                </a>

                <div class="flex items-center gap-6">
                    <a href="{{ url_for('index') }}" class="px-3 py-2 rounded-lg transition-colors {% if active_page == 'home' %}bg-white/20{% else %}hover:bg-white/10{% endif %}">
                        Home
                    </a>
                    <a href="{{ url_for('workspace') }}" class="px-3 py-2 rounded-lg transition-colors {% if active_page == 'workspace' %}bg-white/20{% else %}hover:bg-white/10{% endif %}">
                        Workspace
                    </a>
                    <a href="{{ url_for('guide') }}" class="px-3 py-2 rounded-lg transition-colors {% if active_page == 'guide' %}bg-white/20{% else %}hover:bg-white/10{% endif %}">
                        Instructions
                    </a>

                    <div id="auth-section">
                        <a href="{{ url_for('login') }}" id="login-link" class="px-3 py-2 rounded-lg transition-colors {% if auth_nav_active|default(false) %}bg-white/20{% else %}hover:bg-white/10{% endif %}">
                            Login
                        </a>
                        <div id="user-menu" class="relative hidden">
                            <button id="user-button" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 transition-colors flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </button>
                            <div id="dropdown" class="hidden absolute right-0 mt-2 w-36 bg-white rounded-lg shadow-lg py-2 z-20">
                                <button id="logout-button" class="w-full px-4 py-2 text-left text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                    </svg>
                                    Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="primary-bg text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm opacity-80">
                &copy; 2026 Embroidery Design
            </p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
