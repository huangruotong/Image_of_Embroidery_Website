<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Embroidery Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #F5F7FA;
        }
        .primary-bg {
            background-color: #1A237E;
        }
        .primary-text {
            color: #1A237E;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navigation Bar -->
    <nav class="primary-bg text-white shadow-md">
        <div class="w-full px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Left - Logo -->
                <a href="{{ url_for('login') }}" class="flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758a3 3 0 10-4.243 4.243 3 3 0 004.243-4.243zm0-5.758a3 3 0 10-4.243-4.243 3 3 0 004.243 4.243z"></path>
                    </svg>
                    <span class="text-xl font-semibold">Embroidery Design</span>
                </a>

                <!-- Right - Navigation Links -->
                <div class="flex items-center gap-6">
                    <a href="{{ url_for('index') }}" class="px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">
                        Home
                    </a>
                    <a href="{{ url_for('workspace') }}" class="px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">
                        Workspace
                    </a>
                    <a href="{{ url_for('guide') }}" class="px-3 py-2 rounded-lg hover:bg-white/10 transition-colors">
                        Instructions
                    </a>

                    <!-- User Login/Profile -->
                    <div id="auth-section">
                        <a href="{{ url_for('login') }}" id="login-link" class="px-3 py-2 rounded-lg bg-white/20 transition-colors">
                            Login
                        </a>
                        <div id="user-menu" class="relative hidden">
                            <button id="user-button" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 transition-colors flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </button>
                            <div id="dropdown" class="hidden absolute right-0 mt-2 w-36 bg-white rounded-lg shadow-lg py-2 z-20">
                                <button id="logout-button" class="w-full px-4 py-2 text-left text-gray-700 hover:bg-gray-100 transition-colors flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                    </svg>
                                    Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-1 flex">
    <!-- Left Side - Image -->
    <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
        <img 
            src="{{ url_for('static', filename='images/sign_up.jpg') }}"
            alt="sign up"
            class="absolute inset-0 w-full h-full object-cover"
        />
    </div>

    <!-- Right Side - Sign Up Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 overflow-y-auto min-h-screen" style="background-color: #F5F7FA;">
        <div class="w-full max-w-md">
            <h1 class="text-4xl font-bold mb-8 primary-text">
                Create Account
            </h1>
            
            <p class="text-gray-600 mb-8">
                Already have an account? 
                <a href="{{ url_for('login') }}" class="font-semibold underline primary-text">
                    Sign in here
                </a>
            </p>

            <form id="signup-form" class="space-y-6">
                <div>
                    <label for="name" class="block text-gray-700 mb-2">Name</label>
                    <input
                        id="name"
                        type="text"
                        required
                        class="w-full px-4 py-3 border-2 border-black rounded-lg"
                        style="background-color: #E8E8E8;"
                    />
                </div>

                <div>
                    <label for="email" class="block text-gray-700 mb-2">Email</label>
                    <input
                        id="email"
                        type="email"
                        required
                        class="w-full px-4 py-3 border-2 border-black rounded-lg"
                        style="background-color: #E8E8E8;"
                    />
                </div>

                <div>
                    <label for="password" class="block text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <input
                            id="password"
                            type="password"
                            required
                            minlength="8"
                            class="w-full px-4 py-3 border-2 border-black rounded-lg pr-12"
                            style="background-color: #E8E8E8;"
                        />
                        <button
                            type="button"
                            id="toggle-password"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                        >
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Password must be at least 8 characters</p>
                </div>

                <button 
                    type="submit" 
                    class="w-full primary-bg text-white py-3 px-4 rounded-lg hover:opacity-90 transition-opacity font-medium"
                >
                    Create Account
                </button>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 text-gray-500" style="background-color: #F5F7FA;">OR</span>
                    </div>
                </div>

                <button 
                    type="button" 
                    class="w-full border-2 border-black py-3 px-4 rounded-lg hover:bg-gray-50 transition-colors flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <button 
                    type="button" 
                    class="w-full border-2 border-black py-3 px-4 rounded-lg hover:bg-gray-50 transition-colors flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Continue with Facebook
                </button>
            </form>
        </div>
    </div>
    </div>

    <!-- Footer -->
    <footer class="primary-bg text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm opacity-80">
                © 2026 Embroidery Design
            </p>
        </div>
    </footer>

    <!-- auth.js -->
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>

    <!-- Scripts -->
    <script>
        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        });

        // Handle signup form
        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Validate password length
            if (password.length < 8) {
                alert('Password must be at least 8 characters long!');
                return;
            }

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();
                if (!response.ok) {
                    alert(data.error || 'Sign up failed. Please try again.');
                    return;
                }

                alert('Account created successfully!');
                window.location.href = '/workspace';
            } catch (_) {
                alert('Network error. Please try again.');
            }
        });
    </script>
</body>
</html>
