{% extends "base.html" %}
{% set auth_nav_active = true %}

{% block title %}Login - Embroidery Design{% endblock %}

{% block content %}
<div class="flex-1 flex">
    <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
        <img
            src="{{ url_for('static', filename='images/sign_in.jpg') }}"
            alt="sign in"
            class="absolute inset-0 w-full h-full object-cover"
        />
    </div>

    <div class="auth-panel-bg w-full lg:w-1/2 flex items-center justify-center p-8 overflow-y-auto min-h-screen">
        <div class="w-full max-w-md">
            <h1 class="text-4xl font-bold mb-8 primary-text">
                Sign In
            </h1>
            
            <p class="text-gray-600 mb-8">
                Don't have an account? 
                <a href="{{ url_for('signup') }}" class="font-semibold underline primary-text">
                    Create now
                </a>
            </p>

            <form id="login-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-gray-700 mb-2">Email</label>
                    <input
                        id="email"
                        type="text"
                        class="w-full px-4 py-3 border-2 border-black rounded-lg"
                        style="background-color: #E8E8E8;"
                    />
                    <p id="login-email-error" class="hidden mt-2 text-sm text-red-600 flex items-center gap-1">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span id="login-email-error-text">Please fill in your email.</span>
                    </p>
                </div>

                <div>
                    <label for="password" class="block text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <input
                            id="password"
                            type="password"
                            class="w-full px-4 py-3 border-2 border-black rounded-lg pr-12"
                            style="background-color: #E8E8E8;"
                        />
                        <button
                            type="button"
                            id="toggle-password"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                        >
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    <p id="login-error" class="hidden mt-2 text-sm text-red-600 flex items-center gap-1">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span id="login-error-text">Incorrect email or password.</span>
                    </p>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer text-gray-600">
                        <input type="checkbox" class="rounded">
                        Save account
                    </label>
                    <button type="button" class="font-semibold underline text-sm primary-text">
                        Forgot Password?
                    </button>
                </div>

                <button 
                    type="submit" 
                    class="w-full primary-bg text-white py-3 px-4 rounded-lg hover:opacity-90 transition-opacity font-medium"
                >
                    Sign in
                </button>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="auth-divider-label px-2 text-gray-500">OR</span>
                    </div>
                </div>

                <button 
                    type="button" 
                    class="w-full border-2 border-black py-3 px-4 rounded-lg hover:bg-gray-50 transition-colors flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <button 
                    type="button" 
                    class="w-full border-2 border-black py-3 px-4 rounded-lg hover:bg-gray-50 transition-colors flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Continue with Facebook
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    //显示指定错误提示，并写入提示文案
    function showLoginError(id, message) {
        const errorEl = document.getElementById(id);
        const errorText = document.getElementById(id + '-text');
        if (!errorEl || !errorText) return;
        errorText.textContent = message;
        errorEl.classList.remove('hidden');
    }

    //隐藏指定错误提示
    function hideLoginError(id) {
        const errorEl = document.getElementById(id);
        if (errorEl) errorEl.classList.add('hidden');
    }

    //点击眼睛图标切换密码显示状态
    document.getElementById('toggle-password').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
        } else {
            passwordInput.type = 'password';
            eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        }
    });

    //用户输入时清理旧错误提示
    document.getElementById('email').addEventListener('input', function() { hideLoginError('login-email-error'); hideLoginError('login-error'); });
    document.getElementById('password').addEventListener('input', function() { hideLoginError('login-error'); });

    //先做前端校验，再提交登录请求
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        //要求邮箱格式合法且密码不能为空
        let hasError = false;
        if (!email) {
            showLoginError('login-email-error', 'Please fill in your email.');
            hasError = true;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showLoginError('login-email-error', 'Please enter a valid email address.');
            hasError = true;
        } else {
            hideLoginError('login-email-error');
        }
        if (!password) {
            showLoginError('login-error', 'Please fill in your password.');
            hasError = true;
        } else {
            hideLoginError('login-error');
        }
        if (hasError) return;

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            if (!response.ok) {
                showLoginError('login-error', 'Incorrect email or password.');
                return;
            }

            //登录成功后跳转到工作台
            window.location.href = '/workspace';
        } catch (_) {
            //请求失败时提示用户重试
            showLoginError('login-error', 'Network error. Please try again.');
        }
    });
</script>
{% endblock %}
